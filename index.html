<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ethan Soh</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700;800;900&family=Fragment+Mono&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════════ */
:root {
  --bg:       #f2ede5;
  --card:     #ffffff;
  --card-b:   #faf8f5;
  --border:   rgba(15,10,5,0.09);
  --border2:  rgba(15,10,5,0.17);
  --text:     #100d09;
  --sub:      #5c5048;
  --dim:      #9a8c80;
  --acc:      #5c2ef5;       /* violet */
  --accr:     92,46,245;
  --red:      #e83512;
  --gold:     #d4960e;
  --green:    #1a9e6a;
  --pink:     #e0348a;
  --mono:     'Fragment Mono', monospace;
  --serif:    'Instrument Serif', serif;
  --sans:     'Outfit', sans-serif;
  --gap:      10px;
  --r:        20px;
}
[data-theme="dark"] {
  --bg:       #0a0810;
  --card:     #14101d;
  --card-b:   #1a1428;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.14);
  --text:     #f0ecff;
  --sub:      #9b8fc0;
  --dim:      #60527a;
  --acc:      #7c4fff;
  --accr:     124,79,255;
  --red:      #ff6150;
  --gold:     #fbbf24;
  --green:    #34d399;
  --pink:     #f472b6;
}

/* ════════════════════════════════════════
   RESET
════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background .4s,color .4s;
  cursor:none;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}

/* ════════════════════════════════════════
   CUSTOM CURSOR
════════════════════════════════════════ */
.cursor{
  position:fixed;width:12px;height:12px;
  background:var(--acc);border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:transform .1s,width .25s,height .25s,background .25s;
  mix-blend-mode:multiply;
}
[data-theme="dark"] .cursor{mix-blend-mode:screen}
.cursor.big{width:44px;height:44px;background:rgba(var(--accr),.35)}
.cursor-ring{
  position:fixed;width:38px;height:38px;
  border:1.5px solid rgba(var(--accr),.5);
  border-radius:50%;pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:transform .18s ease,width .25s,height .25s,opacity .25s;
}

/* ════════════════════════════════════════
   GRAIN OVERLAY
════════════════════════════════════════ */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:500;
  opacity:.032;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

/* ════════════════════════════════════════
   AMBIENT BLOBS
════════════════════════════════════════ */
.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.14}
[data-theme="dark"] .blob{opacity:.2}
.b1{width:700px;height:700px;background:radial-gradient(circle,rgba(var(--accr),1),transparent 65%);
    top:-200px;left:-150px;animation:bd 20s ease-in-out infinite alternate}
.b2{width:460px;height:460px;background:var(--red);
    top:30%;right:-100px;animation:bd 26s ease-in-out infinite alternate-reverse}
.b3{width:400px;height:400px;background:var(--gold);
    bottom:-80px;left:35%;animation:bd 30s ease-in-out infinite alternate}
.b4{width:300px;height:300px;background:var(--green);
    bottom:20%;left:-60px;animation:bd 24s ease-in-out infinite alternate}
@keyframes bd{from{transform:translate(0,0) scale(1)}to{transform:translate(38px,28px) scale(1.1)}}

/* ════════════════════════════════════════
   SHELL
════════════════════════════════════════ */
.shell{
  position:relative;z-index:1;
  width:min(1220px,calc(100% - 2rem));
  margin:0 auto;
  padding:1.2rem 0 6rem;
}

/* ════════════════════════════════════════
   MARQUEE TICKER
════════════════════════════════════════ */
.ticker{
  overflow:hidden;white-space:nowrap;
  border-top:1.5px solid var(--border2);
  border-bottom:1.5px solid var(--border2);
  background:var(--acc);
  padding:.55rem 0;
  margin-bottom:var(--gap);
  position:relative;z-index:2;
}
.ticker-track{
  display:inline-flex;gap:3rem;
  animation:tick 22s linear infinite;
}
.ticker-track span{
  font-family:var(--mono);font-size:.68rem;
  text-transform:uppercase;letter-spacing:.14em;color:#fff;
  white-space:nowrap;
}
.ticker-track span.dot{color:rgba(255,255,255,.45);font-size:.5rem}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ════════════════════════════════════════
   TOP
